<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EduTest</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-8">
                    <h1 class="text-2xl font-bold text-indigo-600" id="nav-logo">EduTest</h1>
                    <div class="hidden md:flex space-x-4">
                        <a href="#" class="text-slate-900 font-medium border-b-2 border-indigo-600 px-1 pt-1">Courses</a>
                        <a href="#" class="text-slate-500 hover:text-slate-700 px-1 pt-1">My Learning</a>
                        <a href="#" class="text-slate-500 hover:text-slate-700 px-1 pt-1">Resources</a>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button id="notification-btn" class="p-2 text-slate-400 hover:text-slate-500 relative">
                        <span>🔔</span>
                        <span class="absolute top-1 right-1 block h-2 w-2 rounded-full bg-red-400 ring-2 ring-white"></span>
                    </button>
                    <div class="h-8 w-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold" id="user-avatar">A</div>
                    <button id="logout-btn" class="text-sm font-medium text-slate-500 hover:text-red-600">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h2 class="text-3xl font-bold text-slate-900" id="welcome-user">Welcome back!</h2>
                <p class="text-slate-500 mt-1">Explore our latest courses and start learning today.</p>
            </div>
            <div class="flex gap-2">
                <div class="relative">
                    <input type="text" id="course-search" class="test-input pl-10 w-full md:w-64" placeholder="Search courses...">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                </div>
                <select id="category-filter" class="test-input bg-white">
                    <option value="All">All Categories</option>
                    <option value="Programming">Programming</option>
                    <option value="Web">Web Development</option>
                    <option value="Data">Data Science</option>
                    <option value="Design">Design</option>
                </select>
            </div>
        </header>

        <!-- Stats Section for more test cases -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100" id="stat-enrolled">
                <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Enrolled Courses</p>
                <p class="text-4xl font-bold text-slate-900 mt-2">12</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100" id="stat-completed">
                <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Completed</p>
                <p class="text-4xl font-bold text-slate-900 mt-2">4</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100" id="stat-certificates">
                <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Certificates</p>
                <p class="text-4xl font-bold text-slate-900 mt-2">3</p>
            </div>
        </section>

        <h3 class="text-xl font-bold text-slate-900 mb-6">Featured Courses</h3>
        <div id="course-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Courses rendered by script.js -->
        </div>

        <!-- Pagination -->
        <div class="mt-12 flex items-center justify-center gap-2" id="pagination">
            <button class="p-2 rounded border border-slate-200 hover:bg-slate-100 disabled:opacity-30" id="prev-page" disabled>Previous</button>
            <button class="w-10 h-10 rounded bg-indigo-600 text-white font-bold">1</button>
            <button class="w-10 h-10 rounded border border-slate-200 hover:bg-slate-100">2</button>
            <button class="w-10 h-10 rounded border border-slate-200 hover:bg-slate-100">3</button>
            <button class="p-2 rounded border border-slate-200 hover:bg-slate-100" id="next-page">Next</button>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 mt-20 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
            <p>&copy; 2026 EduTest Platform. All rights reserved.</p>
            <div class="mt-4 flex justify-center space-x-6">
                <a href="privacy.html" class="hover:text-indigo-600">Privacy Policy</a>
                <a href="terms.html" class="hover:text-indigo-600">Terms of Service</a>
            </div>
        </div>
    </footer>

    <script type="module" src="/src/script.js"></script>
</body>
</html>
