<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduTest</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="p-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-slate-900" id="page-title">EduTest Login</h1>
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-100 transition-colors" title="Toggle Theme">🌓</button>
            </div>
            
            <form id="login-form" class="space-y-6">
                <div class="space-y-2">
                    <label for="username" class="block text-sm font-medium text-slate-700">Username / Email</label>
                    <input type="text" id="username" name="username" class="w-full test-input" placeholder="Enter your username" required minlength="5">
                    <p class="error-message" id="username-error">Username is too short</p>
                </div>

                <div class="space-y-2">
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" class="w-full test-input pr-12" placeholder="••••••••" required>
                        <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-xl" aria-label="Toggle password visibility">👁️</button>
                    </div>
                </div>

                <div class="flex items-center justify-end">
                    <a href="#" id="forgot-password" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">Forgot password?</a>
                </div>

                <div id="login-error" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm hidden border border-red-100"></div>

                <button type="submit" id="login-btn" class="w-full test-button py-3 text-lg">Sign In</button>
                
                <div class="mt-4 p-3 bg-indigo-50 border border-indigo-100 rounded-lg text-xs text-indigo-700">
                    <p><strong>Test Credentials:</strong></p>
                    <p>User: <code>admin</code> | Pass: <code>password123</code></p>
                </div>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600">Don't have an account? <a href="register.html" id="go-to-register" class="font-medium text-indigo-600 hover:text-indigo-500">Sign Up</a></p>
            </div>
        </div>
        
        <div class="bg-slate-50 px-8 py-4 border-t border-slate-100 flex justify-between text-xs text-slate-500">
            <a href="terms.html" id="terms-link">Terms of Service</a>
            <a href="privacy.html" id="privacy-link">Privacy Policy</a>
        </div>
    </div>

    <script type="module" src="/src/script.js"></script>
</body>
</html>
