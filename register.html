<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EduTest</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="p-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-slate-900" id="page-title">Create Account</h1>
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-100 transition-colors" title="Toggle Theme">🌓</button>
            </div>
            
            <form id="register-form" class="space-y-4">
                <div class="space-y-2">
                    <label for="reg-username" class="block text-sm font-medium text-slate-700">Username</label>
                    <input type="text" id="reg-username" name="username" class="w-full test-input" placeholder="Choose a username" required minlength="5">
                </div>

                <div class="space-y-2">
                    <label for="reg-email" class="block text-sm font-medium text-slate-700">Email Address</label>
                    <input type="email" id="reg-email" name="email" class="w-full test-input" placeholder="you@example.com" required>
                </div>

                <div class="space-y-2">
                    <label for="reg-password" class="block text-sm font-medium text-slate-700">Password</label>
                    <input type="password" id="reg-password" name="password" class="w-full test-input" placeholder="••••••••" required minlength="8">
                </div>

                <div class="space-y-2">
                    <label for="confirm-password" class="block text-sm font-medium text-slate-700">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" class="w-full test-input" placeholder="••••••••" required>
                </div>

                <div class="flex items-start gap-2 py-2">
                    <input type="checkbox" id="reg-terms" class="mt-1" required>
                    <label for="reg-terms" class="text-xs text-slate-500">I agree to the <a href="terms.html" class="text-indigo-600 underline">Terms of Service</a> and <a href="privacy.html" class="text-indigo-600 underline">Privacy Policy</a>.</label>
                </div>

                <div id="register-error" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm hidden border border-red-100"></div>
                <div id="register-success" class="bg-green-50 text-green-600 p-3 rounded-lg text-sm hidden border border-green-100">Account created! Redirecting to login...</div>

                <button type="submit" id="register-btn" class="w-full test-button py-3 text-lg">Sign Up</button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600">Already have an account? <a href="login.html" class="font-medium text-indigo-600 hover:text-indigo-500">Sign In</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/script.js"></script>
</body>
</html>
